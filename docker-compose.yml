services:
  web:
    build: .
    container_name: php_crud
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
 
  db:
    image: mysql:5.7
    container_name: mysql_crud
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bd_estudiantes
    ports:
      - "3307:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d